id: ordinario_v1
nombre: "Proceso ordinario - control general"
version: "0.1"
descripcion: >
  Playbook procesal base para analizar expedientes ordinarios civiles,
  comerciales o asimilables. Sirve para detectar etapa actual, hitos
  cumplidos, hitos pendientes, documentos relevantes y documentos accesorios.

principio_general:
  captura: "Siempre descargar todo el expediente disponible."
  analisis: "No resumir todo. Analizar por hitos procesales y etapa actual."
  regla: >
    Si un hito posterior consolida una etapa anterior, los pasos intermedios
    de esa etapa se conservan en la cronología bruta pero no deben ocupar el
    informe principal salvo que exista incidencia, nulidad, rebeldía o cuestión pendiente.

preguntas_de_control:
  - "¿Cuál es el tipo de proceso?"
  - "¿Cuál es la etapa procesal actual?"
  - "¿Existe demanda inicial?"
  - "¿Quiénes son los demandados?"
  - "¿La litis está integrada o trabada?"
  - "¿Contestaron demanda todos los demandados?"
  - "¿Hubo rebeldía?"
  - "¿Hubo traslado de contestación de demanda?"
  - "¿La actora contestó el traslado?"
  - "¿Se abrió la causa a prueba?"
  - "¿Qué prueba se ordenó producir?"
  - "¿Qué prueba produjo cada parte?"
  - "¿Hay certificación de prueba?"
  - "¿Queda prueba pendiente?"
  - "¿Se presentaron alegatos?"
  - "¿Se llamó autos para sentencia?"
  - "¿Hay sentencia?"
  - "¿La sentencia fue apelada?"
  - "¿Hay resolución de Cámara?"
  - "¿Está en etapa de ejecución?"
  - "¿Se pagó capital?"
  - "¿Se regularon honorarios?"
  - "¿Se pagaron honorarios?"
  - "¿Cuál es el próximo paso útil?"

