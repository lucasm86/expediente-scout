reglas_de_omision:
  - id: notificaciones_superadas
    condicion: "Si la litis está integrada."
    omitir_del_informe:
      - "cédulas de traslado"
      - "constancias de confronte"
      - "reintentos de notificación"
      - "movimientos administrativos de notificación"
    excepciones:
      - "nulidad de notificación"
      - "rebeldía"
      - "demandado no notificado"
      - "cuestión pendiente sobre domicilio"

  - id: prueba_certificada
    condicion: "Si existe auto de certificación de prueba."
    omitir_del_informe:
      - "oficios individuales ya certificados"
      - "agregaciones probatorias sin incidencia"
      - "movimientos administrativos de producción de prueba"
    excepciones:
      - "prueba pendiente"
      - "prueba observada"
      - "impugnación de pericia"
      - "caducidad o negligencia probatoria"

  - id: etapa_sentencia_superada
    condicion: "Si ya existe sentencia."
    priorizar:
      - "sentencia"
      - "apelaciones"
      - "cámara"
      - "liquidación"
      - "ejecución"
      - "honorarios"
    omitir_detalle:
      - "pasos ordinarios previos salvo demanda, contestación y prueba clave"

salidas:
  informe_markdown:
    incluir:
      - "identificación del expediente"
      - "tipo de proceso detectado"
      - "etapa procesal actual"
      - "resumen ejecutivo"
      - "hitos cumplidos"
      - "hitos pendientes"
      - "documentos clave"
      - "riesgos o cuestiones pendientes"
      - "próximos pasos sugeridos"
      - "puntos dudosos para revisión humana"

  json_sistema:
    incluir:
      - "expediente_id"
      - "tipo_proceso_detectado"
      - "etapa_actual"
      - "hitos"
      - "pasos_procesales_relevantes"
      - "documentos_accesorios"
      - "documentos_clave"
      - "advertencias"
